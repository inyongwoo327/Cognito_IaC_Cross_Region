name: Secure deployment to AWS multi-region

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.8.0"
  AWS_DEFAULT_REGION: "us-east-1"

jobs:
  # Job 1 — Lint and Validate
  lint:
    name: Lint / Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # Job 2 — Security Scan (checkov)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail_on: LOW,MEDIUM
          output_format: cli
          download_external_modules: false

  # Job 3 — Terraform Plan
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          TF_VAR_test_user_email:    ${{ secrets.TF_VAR_test_user_email }}
          TF_VAR_test_user_password: ${{ secrets.TF_VAR_test_user_password }}
          TF_VAR_github_repo:        ${{ secrets.TF_VAR_github_repo }}
        run: terraform plan -out=tfplan -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: tfplan
          path: tfplan

  # Job 4 — Deploy (main branch only)
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_test_user_email:    ${{ secrets.TF_VAR_test_user_email }}
          TF_VAR_test_user_password: ${{ secrets.TF_VAR_test_user_password }}
          TF_VAR_github_repo:        ${{ secrets.TF_VAR_github_repo }}
        run: terraform apply -auto-approve

      - name: Capture Terraform outputs
        id: tf_outputs
        env:
          TF_VAR_test_user_email:    ${{ secrets.TF_VAR_test_user_email }}
          TF_VAR_test_user_password: ${{ secrets.TF_VAR_test_user_password }}
          TF_VAR_github_repo:        ${{ secrets.TF_VAR_github_repo }}
        run: |
          echo "API_US=$(terraform output -raw api_url_us_east_1)" >> $GITHUB_ENV
          echo "API_EU=$(terraform output -raw api_url_eu_west_1)" >> $GITHUB_ENV
          echo "POOL_ID=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_ENV
          echo "CLIENT_ID=$(terraform output -raw cognito_client_id)" >> $GITHUB_ENV

      # Test Execution Placeholder 
      # In a real run, provide AWS credentials so test.py can call Cognito.
      # The step below shows the exact command that would execute post-deploy.
      - name: "[PLACEHOLDER] Run integration tests"
        run: |
          echo "Would execute:"
          echo "  pip install boto3 requests"
          echo "  python test.py \\"
          echo "    --pool-id    $POOL_ID \\"
          echo "    --client-id  $CLIENT_ID \\"
          echo "    --email      \$TF_VAR_test_user_email \\"
          echo "    --password   \$TF_VAR_test_user_password \\"
          echo "    --api-us     $API_US \\"
          echo "    --api-eu     $API_EU"

  # Job 5 — Destroy (manual trigger only — safety gate)
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        env:
          TF_VAR_test_user_email:    ${{ secrets.TF_VAR_test_user_email }}
          TF_VAR_test_user_password: ${{ secrets.TF_VAR_test_user_password }}
          TF_VAR_github_repo:        ${{ secrets.TF_VAR_github_repo }}
        run: terraform destroy -auto-approve
